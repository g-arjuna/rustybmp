version: "3.9"

services:
  rustybmp:
    build: .
    image: rustybmp:latest
    container_name: rustybmp
    restart: unless-stopped
    ports:
      - "5000:5000"   # BMP receiver
      - "7878:7878"   # HTTP API
      - "5001:5001"   # Collector protocol
    volumes:
      - rustybmp-data:/data
      - ./config/rustybmp.toml.example:/app/rustybmp.toml:ro
    environment:
      - RUST_LOG=info
    depends_on:
      - kafka
      - nats

  rbmp-collector:
    build: .
    image: rustybmp:latest
    container_name: rbmp-collector
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/rbmp-collector"]
    ports:
      - "6000:5000"   # BMP (edge facing)
    environment:
      - RUST_LOG=info
      - RBMP_CORE_ADDR=rustybmp:5001
    depends_on:
      - rustybmp

  # ── Optional: Kafka ──────────────────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - zk-data:/bitnami/zookeeper
    profiles: ["kafka"]

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    volumes:
      - kafka-data:/bitnami/kafka
    profiles: ["kafka"]

  # ── Optional: NATS ───────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"   # NATS monitoring
    command: ["-js", "-m", "8222"]
    profiles: ["nats"]

  # ── Optional: Svelte UI (dev server) ────────────────────────────────────────
  ui:
    image: node:22-alpine
    container_name: rustybmp-ui
    working_dir: /ui
    volumes:
      - ./ui:/ui
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles: ["ui"]

volumes:
  rustybmp-data:
  zk-data:
  kafka-data:
