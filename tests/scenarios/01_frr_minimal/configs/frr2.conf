frr version 10.6.1
frr defaults traditional
hostname frr2
log syslog informational
no ipv6 forwarding

interface eth1
 ip address 10.20.1.2/30
!

interface eth2
 ip address 10.20.11.1/30
!

ip route 10.200.1.0/24 Null0
ip route 10.200.2.0/24 Null0
!

router bgp 65100
 bgp router-id 10.20.1.2
 no bgp ebgp-requires-policy
 neighbor 10.20.1.1 remote-as 65100
 neighbor 10.20.1.1 description frr1
 neighbor 10.20.1.1 update-source eth1

 address-family ipv4 unicast
  network 10.200.1.0/24
  network 10.200.2.0/24
  neighbor 10.20.1.1 activate
  neighbor 10.20.1.1 soft-reconfiguration inbound
 exit-address-family
!

 bmp targets rustybmp
  bmp connect 172.20.20.1 port 15000 min-retry 5000 max-retry 10000
  bmp monitor ipv4 unicast pre-policy
  bmp monitor ipv4 unicast post-policy
 exit-bmp
!

line vty
!
