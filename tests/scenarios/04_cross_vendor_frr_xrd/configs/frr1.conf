frr version 10.6.1
frr defaults traditional
hostname frr1
log syslog informational
ipv6 forwarding

interface eth1
 ip address 10.40.1.1/30
 ipv6 address 2001:db8:40:1::1/64
!

ip route 10.140.1.0/24 Null0
ip route 10.140.2.0/24 Null0
ip route 10.141.1.0/24 Null0
ip route 10.141.2.0/24 Null0
!
ipv6 route 2001:db8:140:1::/64 Null0
ipv6 route 2001:db8:140:2::/64 Null0
!

router bgp 65100
 bgp router-id 10.40.1.1
 no bgp ebgp-requires-policy
 neighbor 10.40.1.2 remote-as 65200
 neighbor 10.40.1.2 description xrd-pe1
 neighbor 2001:db8:40:1::2 remote-as 65200
 neighbor 2001:db8:40:1::2 description xrd-pe1-v6

 address-family ipv4 unicast
  network 10.140.1.0/24
  network 10.140.2.0/24
  neighbor 10.40.1.2 activate
  neighbor 10.40.1.2 soft-reconfiguration inbound
 exit-address-family
 !
 address-family ipv4 multicast
  network 10.141.1.0/24
  network 10.141.2.0/24
  neighbor 10.40.1.2 activate
  neighbor 10.40.1.2 soft-reconfiguration inbound
 exit-address-family
 !
 address-family ipv6 unicast
  network 2001:db8:140:1::/64
  network 2001:db8:140:2::/64
  neighbor 2001:db8:40:1::2 activate
  neighbor 2001:db8:40:1::2 soft-reconfiguration inbound
 exit-address-family
!

 bmp targets rustybmp
  bmp connect 172.20.23.1 port 15000 min-retry 5000 max-retry 10000
  bmp monitor ipv4 unicast pre-policy
  bmp monitor ipv4 unicast post-policy
  bmp monitor ipv4 multicast pre-policy
  bmp monitor ipv4 multicast post-policy
  bmp monitor ipv6 unicast pre-policy
  bmp monitor ipv6 unicast post-policy
 exit-bmp
!

line vty
!
