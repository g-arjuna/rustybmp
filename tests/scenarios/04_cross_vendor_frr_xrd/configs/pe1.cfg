hostname pe1
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.40.1.2 255.255.255.252
 ipv6 address 2001:db8:40:1::2/64
 no shutdown
!
router static
 address-family ipv4 unicast
  10.240.1.0/24 Null0
  10.240.2.0/24 Null0
  10.241.1.0/24 Null0
  10.241.2.0/24 Null0
 !
 address-family ipv6 unicast
  2001:db8:240:1::/64 Null0
  2001:db8:240:2::/64 Null0
 !
!
router bgp 65200
 bgp router-id 10.40.1.2
 address-family ipv4 unicast
  network 10.240.1.0/24
  network 10.240.2.0/24
 !
 address-family ipv4 multicast
  network 10.241.1.0/24
  network 10.241.2.0/24
 !
 address-family ipv6 unicast
  network 2001:db8:240:1::/64
  network 2001:db8:240:2::/64
 !
 neighbor 10.40.1.1
  remote-as 65100
  bmp-activate server 1
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
   soft-reconfiguration inbound always
  !
  address-family ipv4 multicast
   route-policy PASS in
   route-policy PASS out
   soft-reconfiguration inbound always
  !
 !
 neighbor 2001:db8:40:1::1
  remote-as 65100
  bmp-activate server 1
  address-family ipv6 unicast
   route-policy PASS in
   route-policy PASS out
   soft-reconfiguration inbound always
  !
 !
!
bmp server all
 route-monitoring inbound pre-policy
!
bmp server 1
 host 172.20.23.1 port 15000
 description rustybmp-host
 flapping-delay 60
 initial-delay 15
 stats-reporting-period 30
 initial-refresh delay 15 spread 2
!
route-policy PASS
 pass
end-policy
!
end
