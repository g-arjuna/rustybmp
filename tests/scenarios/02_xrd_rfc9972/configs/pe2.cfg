hostname pe2
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.30.1.2 255.255.255.252
 no shutdown
!
router static
 address-family ipv4 unicast
  10.220.1.0/24 Null0
  10.220.2.0/24 Null0
 !
!
router bgp 65200
 bgp router-id 10.30.1.2
 address-family ipv4 unicast
  network 10.220.1.0/24
  network 10.220.2.0/24
 !
 neighbor 10.30.1.1
  remote-as 65200
  bmp-activate server 1
  update-source GigabitEthernet0/0/0/0
  address-family ipv4 unicast
   soft-reconfiguration inbound always
  !
 !
 !
!
bmp server all
 route-monitoring inbound pre-policy
!
bmp server 1
 host 172.20.21.1 port 15000
 description rustybmp-host
 flapping-delay 60
 initial-delay 15
 stats-reporting-period 30
 initial-refresh delay 15 spread 2
!
end
