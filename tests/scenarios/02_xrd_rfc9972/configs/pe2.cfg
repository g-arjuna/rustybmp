hostname pe2
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.30.1.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv4 address 10.30.11.1 255.255.255.252
 no shutdown
!
router bgp 65200
 bgp router-id 10.30.1.2
 address-family ipv4 unicast
 !
 neighbor 10.30.1.1
  remote-as 65200
  update-source GigabitEthernet0/0/0/0
  address-family ipv4 unicast
   soft-reconfiguration inbound always
  !
 !
 !
 network 10.220.1.0/24
 network 10.220.2.0/24
!
bmp server 1
 host 10.30.11.2 port 5000
 description rustybmp-collector
 update-source GigabitEthernet0/0/0/1
 initial-delay 30
 stats-reporting-period 30
!
bmp
 server 1
!
end
