name: xrd-rfc9972

mgmt:
  network: xrd-rfc9972-mgmt
  ipv4-subnet: 172.20.21.0/24

topology:
  nodes:

    # ── PE1 (Cisco XRd — RFC 9972 Stats enabled) ────────────────────────────
    pe1:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:24.4.2
      startup-config: configs/pe1.cfg

    # ── PE2 (Cisco XRd) ──────────────────────────────────────────────────────
    pe2:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:24.4.2
      startup-config: configs/pe2.cfg

  links:
    # PE1 ↔ PE2 (iBGP backbone)
    - endpoints: ["pe1:Gi0-0-0-0", "pe2:Gi0-0-0-0"]
