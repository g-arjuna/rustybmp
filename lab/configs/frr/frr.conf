frr version 10.1.2
frr defaults traditional
hostname ce1
log syslog informational
no ipv6 forwarding

interface eth1
 ip address 10.1.11.2/30
!

router bgp 65001
 bgp router-id 10.1.11.2
 no bgp ebgp-requires-policy
 neighbor 10.1.11.1 remote-as 65000
 neighbor 10.1.11.1 description PE1

 address-family ipv4 unicast
  network 192.0.2.0/24
  network 192.0.2.128/25
  network 198.51.100.0/24
  neighbor 10.1.11.1 activate
  neighbor 10.1.11.1 soft-reconfiguration inbound
 exit-address-family
!

line vty
!
