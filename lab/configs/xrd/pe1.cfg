!! PE1 — XRd control-plane config
!! iBGP with PE2, eBGP with CE1, BMP to rustybmp

hostname pe1

interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!

interface GigabitEthernet0/0/0/0
 description PE1-to-PE2
 ipv4 address 10.1.12.1 255.255.255.252
 no shutdown
!

interface GigabitEthernet0/0/0/1
 description PE1-to-CE1
 ipv4 address 10.1.11.1 255.255.255.252
 no shutdown
!

interface GigabitEthernet0/0/0/2
 description PE1-to-rustybmp (BMP mgmt)
 ipv4 address 10.100.0.1 255.255.255.252
 no shutdown
!

router ospf 1
 router-id 10.0.0.1
 area 0
  interface Loopback0
   passive
  !
  interface GigabitEthernet0/0/0/0
  !
 !
!

router bgp 65000
 bgp router-id 10.0.0.1
 address-family ipv4 unicast
  network 10.0.0.1/32
 !
 neighbor 10.0.0.2
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
  !
 !
 neighbor 10.1.11.2
  remote-as 65001
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
!

route-policy PASS
  pass
end-policy

bmp server 1
 host 10.100.0.2 port 5000
 description rustybmp-collector
 update-source GigabitEthernet0/0/0/2
 flapping-delay 30
 initial-delay 15
 stats-reporting-period 60
 initial-refresh delay 15 spread 2
!

bmp neighbor address-family ipv4 unicast
 bmp-servers 1
!

end
