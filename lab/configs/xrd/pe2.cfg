!! PE2 — XRd control-plane config
!! iBGP with PE1, BMP to rustybmp

hostname pe2

interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
!

interface GigabitEthernet0/0/0/0
 description PE2-to-PE1
 ipv4 address 10.1.12.2 255.255.255.252
 no shutdown
!

interface GigabitEthernet0/0/0/2
 description PE2-to-rustybmp (BMP mgmt)
 ipv4 address 10.100.0.5 255.255.255.252
 no shutdown
!

router ospf 1
 router-id 10.0.0.2
 area 0
  interface Loopback0
   passive
  !
  interface GigabitEthernet0/0/0/0
  !
 !
!

router bgp 65000
 bgp router-id 10.0.0.2
 address-family ipv4 unicast
  network 10.0.0.2/32
 !
 neighbor 10.0.0.1
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
   next-hop-self
  !
 !
!

route-policy PASS
  pass
end-policy

bmp server 1
 host 10.100.0.6 port 5000
 description rustybmp-collector
 update-source GigabitEthernet0/0/0/2
 flapping-delay 30
 initial-delay 15
 stats-reporting-period 60
 initial-refresh delay 15 spread 2
!

bmp neighbor address-family ipv4 unicast
 bmp-servers 1
!

end
