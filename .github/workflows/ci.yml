name: CI

on:
  push:
    branches: [main, rv4]
  pull_request:
    branches: [main, rv4]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: check + test + clippy ──────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --profile ci

      - name: cargo clippy
        run: cargo clippy --workspace --profile ci -- -D warnings

      - name: cargo test
        run: cargo test --workspace --profile ci

  # ── Python: lint + typecheck ─────────────────────────────────────────────────
  python:
    name: Python SDK
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bmppy deps
        working-directory: bmppy
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff lint
        working-directory: bmppy
        run: ruff check rbmppy/

      - name: mypy
        working-directory: bmppy
        run: mypy rbmppy/ --ignore-missing-imports

      - name: pytest
        working-directory: bmppy
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No Python tests yet"

  # ── Docker: build + smoke ────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rustybmp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name rustybmp-ci \
            -p 7878:7878 \
            -e RUST_LOG=warn \
            rustybmp:ci rustybmp /app/rustybmp.toml.example
          sleep 5
          curl --fail http://localhost:7878/health
          docker rm -f rustybmp-ci
