# rustybmp RV6 — default filter chain
# Format: list of route filters evaluated in order (first match wins)
# action: accept | deny | tag
# All specified fields are ANDed; prefix_list uses subnet matching.

- name: block-bogons
  action: deny
  prefix_list:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.2.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 240.0.0.0/4

- name: block-too-specific-v4
  action: deny
  expr: "prefix_len > 24"

- name: block-rpki-invalid
  action: deny
  expr: "rpki == 'invalid'"

- name: accept-all
  action: accept
